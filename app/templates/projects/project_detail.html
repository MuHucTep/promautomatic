{% extends 'base.html' %}

{% block title %}{{ project.title }} | Промышленная Автоматизация{% endblock %}

{% block extra_css %}
<style>
    .project-detail {
        max-width: 1000px;
        margin: 0 auto;
        padding: 40px 20px;
    }
    .project-detail h2 {
        font-size: 2.5rem;
        margin-bottom: 20px;
        color: #1a237e;
    }
    .project-detail-image {
        width: 100%;
        max-height: 500px;
        object-fit: cover;
        border-radius: 8px;
        margin-bottom: 30px;
    }
    .project-detail-content {
        font-size: 1.1rem;
        line-height: 1.8;
        color: #333;
        white-space: pre-wrap;
    }
    .back-link {
        display: inline-block;
        margin-bottom: 20px;
        color: #1a237e;
        text-decoration: none;
        font-weight: 500;
    }
    .back-link:hover {
        text-decoration: underline;
    }
</style>
{% endblock %}

{% block content %}
    <section class="section fade-in-bottom" style="padding-top: 80px;">
        <div class="container">
            <div class="project-detail">
                <a href="{% url 'root' %}" class="back-link">&larr; Вернуться на главную</a>
                <h2>{{ project.title }}</h2>
                {% if project.preview_image %}
                    <img src="{{ project.preview_image.url }}" alt="{{ project.title }}" class="project-detail-image">
                {% endif %}
                <div class="project-detail-content">
                    {{ project.description }}
                </div>
            </div>
        </div>
    </section>
{% endblock %}
